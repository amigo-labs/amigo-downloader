name: Nightly Build

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC every night
  workflow_dispatch: # allow manual trigger

env:
  CARGO_TERM_COLOR: always
  NIGHTLY_DATE: "" # set dynamically in jobs

permissions:
  contents: write
  packages: write

jobs:
  # ─── CLI Binaries ──────────────────────────────────────────────────
  cli:
    name: CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cli_archive: amigo-dl-linux-x86_64.tar.gz
            server_archive: amigo-server-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cli_archive: amigo-dl-linux-aarch64.tar.gz
            server_archive: amigo-server-linux-aarch64.tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cli_archive: amigo-dl-macos-x86_64.tar.gz
            server_archive: amigo-server-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            cli_archive: amigo-dl-macos-aarch64.tar.gz
            server_archive: amigo-server-macos-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cli_archive: amigo-dl-windows-x86_64.zip
            server_archive: amigo-server-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set nightly version
        shell: bash
        run: |
          DATE=$(date -u +%Y%m%d)
          BASE_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          NIGHTLY_VERSION="${BASE_VERSION}-nightly.${DATE}"
          echo "NIGHTLY_DATE=${DATE}" >> $GITHUB_ENV
          echo "NIGHTLY_VERSION=${NIGHTLY_VERSION}" >> $GITHUB_ENV
          # Stamp version into workspace Cargo.toml (perl for macOS compat)
          perl -i -pe "s/^version = \"${BASE_VERSION}\"/version = \"${NIGHTLY_VERSION}\"/" Cargo.toml

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install protobuf compiler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protobuf compiler (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Create web-ui dist stub
        run: mkdir -p web-ui/dist

      - name: Install cross tool
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build CLI and Server
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p amigo-cli -p amigo-server

      - name: Build CLI and Server (cross)
        if: ${{ matrix.cross }}
        run: cross build --release --target ${{ matrix.target }} -p amigo-cli -p amigo-server

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release

          tar czf ../../../${{ matrix.cli_archive }} amigo-dl
          cd ../../..
          sha256sum ${{ matrix.cli_archive }} > ${{ matrix.cli_archive }}.sha256

          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.server_archive }} amigo-server
          cd ../../..
          sha256sum ${{ matrix.server_archive }} > ${{ matrix.server_archive }}.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/amigo-dl.exe -DestinationPath ${{ matrix.cli_archive }}
          (Get-FileHash ${{ matrix.cli_archive }} -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.cli_archive }}" | Out-File -Encoding ascii ${{ matrix.cli_archive }}.sha256

          Compress-Archive -Path target/${{ matrix.target }}/release/amigo-server.exe -DestinationPath ${{ matrix.server_archive }}
          (Get-FileHash ${{ matrix.server_archive }} -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.server_archive }}" | Out-File -Encoding ascii ${{ matrix.server_archive }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            ${{ matrix.cli_archive }}
            ${{ matrix.cli_archive }}.sha256
            ${{ matrix.server_archive }}
            ${{ matrix.server_archive }}.sha256

  # ─── Docker Image (multi-arch) ─────────────────────────────────────
  docker:
    name: Docker (amd64 + arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set nightly date
        run: echo "NIGHTLY_DATE=$(date -u +%Y%m%d)" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/amigo-labs/amigo-downloader:nightly
            ghcr.io/amigo-labs/amigo-downloader:nightly-${{ env.NIGHTLY_DATE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Desktop Installers (Tauri) ────────────────────────────────────
  installers:
    name: Installer (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set nightly version
        shell: bash
        run: |
          DATE=$(date -u +%Y%m%d)
          BASE_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          NIGHTLY_VERSION="${BASE_VERSION}-nightly.${DATE}"
          echo "NIGHTLY_VERSION=${NIGHTLY_VERSION}" >> $GITHUB_ENV
          # Stamp workspace Cargo.toml (perl for macOS compat)
          perl -i -pe "s/^version = \"${BASE_VERSION}\"/version = \"${NIGHTLY_VERSION}\"/" Cargo.toml
          # Stamp tauri.conf.json
          perl -i -pe "s/\"version\": \"${BASE_VERSION}\"/\"version\": \"${NIGHTLY_VERSION}\"/" tauri/tauri.conf.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: tauri-${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protobuf compiler (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Build Web UI
        working-directory: web-ui
        run: |
          npm ci
          npx vite build

      - name: Build Tauri installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.target }}
          path: |
            tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz
            tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz.sig
            tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip
            tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip.sig
            tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig

  # ─── Nightly Release ───────────────────────────────────────────────
  release:
    name: Publish nightly release
    needs: [cli, docker, installers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Set nightly date
        run: |
          DATE=$(date -u +%Y%m%d)
          BASE_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "NIGHTLY_DATE=${DATE}" >> $GITHUB_ENV
          echo "NIGHTLY_VERSION=${BASE_VERSION}-nightly.${DATE}" >> $GITHUB_ENV

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create/update nightly release (latest)
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: "Nightly (${{ env.NIGHTLY_VERSION }})"
          body: |
            **Version:** `${{ env.NIGHTLY_VERSION }}`
            **Commit:** `${{ github.sha }}`

            ### Install CLI
            ```bash
            curl -fsSL https://raw.githubusercontent.com/amigo-labs/amigo-downloader/main/scripts/install.sh | bash
            ```

            ### Docker
            ```bash
            docker pull ghcr.io/amigo-labs/amigo-downloader:nightly
            docker pull ghcr.io/amigo-labs/amigo-downloader:nightly-${{ env.NIGHTLY_DATE }}
            ```
          artifacts: "artifacts/**"
          allowUpdates: true
          prerelease: true
          makeLatest: false

      - name: Create dated nightly release
        uses: ncipollo/release-action@v1
        with:
          tag: "nightly-${{ env.NIGHTLY_DATE }}"
          name: "Nightly ${{ env.NIGHTLY_DATE }} (${{ env.NIGHTLY_VERSION }})"
          body: |
            **Version:** `${{ env.NIGHTLY_VERSION }}`
            **Commit:** `${{ github.sha }}`
          artifacts: "artifacts/**"
          prerelease: true
          makeLatest: false
