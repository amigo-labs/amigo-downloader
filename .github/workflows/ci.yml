name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust (clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Create web-ui dist stub
        run: mkdir -p web-ui/dist

      - name: Clippy (includes check)
        run: cargo clippy --workspace --exclude amigo-desktop --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude amigo-desktop --locked

  web-ui:
    name: Web UI (build + check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm run check

  plugin-sdk:
    name: Plugin SDK (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin-sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugin-sdk/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: amigo-downloader:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
