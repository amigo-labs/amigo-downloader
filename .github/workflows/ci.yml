name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust (check, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2

      - name: Create web-ui dist stub
        run: mkdir -p web-ui/dist

      - name: Check
        run: cargo check --workspace --exclude amigo-desktop

      - name: Clippy
        run: cargo clippy --workspace --exclude amigo-desktop -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude amigo-desktop

  web-ui:
    name: Web UI (build + check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm run check

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t amigo-downloader:ci .
