name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"

jobs:
  rust-fmt:
    name: Rust (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format check
        run: cargo fmt --all -- --check

  rust:
    name: Rust (clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Create web-ui dist stub
        run: mkdir -p web-ui/dist

      - name: Clippy (includes check)
        run: cargo clippy --workspace --exclude amigo-desktop --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude amigo-desktop --locked

  cargo-audit:
    name: Cargo audit (known vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        run: cargo audit --deny warnings

  pnpm-audit:
    name: pnpm audit (npm advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: pnpm audit (moderate+)
        run: pnpm audit --audit-level moderate

  web-ui:
    name: Web UI (build + check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter amigo-web-ui build

      - name: Check
        run: pnpm --filter amigo-web-ui check

  plugin-sdk:
    name: Plugin SDK (typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @amigo/plugin-sdk typecheck

      - name: Test
        run: pnpm --filter @amigo/plugin-sdk test

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: amigo-downloader:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Synthetic non-zero pubkey to satisfy plugin-runtime/build.rs;
          # this image is only loaded locally for the build smoke test
          # and never pushed. Real release / nightly images must inject
          # the genuine registry pubkey via secret.
          build-args: |
            AMIGO_REGISTRY_PUBKEY_HEX=deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef
