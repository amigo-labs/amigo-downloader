name: Release Build

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v0.2.0)"
        required: true
        type: string
      version:
        description: "Version without v prefix (e.g. 0.2.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  # ─── CLI + Server Binaries ─────────────────────────────────────────
  cli:
    name: CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cli_archive: amigo-dl-linux-x86_64.tar.gz
            server_archive: amigo-server-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cli_archive: amigo-dl-linux-aarch64.tar.gz
            server_archive: amigo-server-linux-aarch64.tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cli_archive: amigo-dl-macos-x86_64.tar.gz
            server_archive: amigo-server-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            cli_archive: amigo-dl-macos-aarch64.tar.gz
            server_archive: amigo-server-macos-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cli_archive: amigo-dl-windows-x86_64.zip
            server_archive: amigo-server-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install protobuf compiler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protobuf compiler (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Create web-ui dist stub
        run: mkdir -p web-ui/dist

      - name: Install cross tool
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build CLI and Server
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p amigo-cli -p amigo-server

      - name: Build CLI and Server (cross)
        if: ${{ matrix.cross }}
        run: cross build --release --target ${{ matrix.target }} -p amigo-cli -p amigo-server

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release

          tar czf ../../../${{ matrix.cli_archive }} amigo-dl
          cd ../../..
          sha256sum ${{ matrix.cli_archive }} > ${{ matrix.cli_archive }}.sha256

          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.server_archive }} amigo-server
          cd ../../..
          sha256sum ${{ matrix.server_archive }} > ${{ matrix.server_archive }}.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/amigo-dl.exe -DestinationPath ${{ matrix.cli_archive }}
          (Get-FileHash ${{ matrix.cli_archive }} -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.cli_archive }}" | Out-File -Encoding ascii ${{ matrix.cli_archive }}.sha256

          Compress-Archive -Path target/${{ matrix.target }}/release/amigo-server.exe -DestinationPath ${{ matrix.server_archive }}
          (Get-FileHash ${{ matrix.server_archive }} -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.server_archive }}" | Out-File -Encoding ascii ${{ matrix.server_archive }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            ${{ matrix.cli_archive }}
            ${{ matrix.cli_archive }}.sha256
            ${{ matrix.server_archive }}
            ${{ matrix.server_archive }}.sha256

  # ─── Docker Image (multi-arch) ─────────────────────────────────────
  docker:
    name: Docker (amd64 + arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version parts
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MAJOR.$MINOR" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/amigo-labs/amigo-downloader:latest
            ghcr.io/amigo-labs/amigo-downloader:${{ inputs.version }}
            ghcr.io/amigo-labs/amigo-downloader:${{ steps.version.outputs.minor }}
            ghcr.io/amigo-labs/amigo-downloader:${{ steps.version.outputs.major }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Desktop Installers (Tauri) ────────────────────────────────────
  installers:
    name: Installer (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: tauri-release-${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protobuf compiler (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Build Web UI
        working-directory: web-ui
        run: |
          npm ci
          npx vite build

      - name: Build Tauri installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.target }}
          path: |
            tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz
            tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz.sig
            tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip
            tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip.sig
            tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig

  # ─── Upload to GitHub Release + Tauri Updater JSON ─────────────────
  upload:
    name: Upload release artifacts
    needs: [cli, docker, installers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate Tauri updater JSON
        run: |
          VERSION="${{ inputs.version }}"
          TAG="${{ inputs.tag_name }}"
          REPO="amigo-labs/amigo-downloader"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read signatures if they exist, otherwise empty string
          read_sig() {
            local file="$1"
            if [ -f "$file" ]; then
              cat "$file"
            else
              echo ""
            fi
          }

          # Find Tauri artifacts and their signatures
          LINUX_URL=""
          LINUX_SIG=""
          MACOS_X86_URL=""
          MACOS_X86_SIG=""
          MACOS_ARM_URL=""
          MACOS_ARM_SIG=""
          WINDOWS_URL=""
          WINDOWS_SIG=""

          # Linux AppImage
          for f in artifacts/*.AppImage.tar.gz; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            LINUX_URL="${BASE_URL}/${BASENAME}"
            LINUX_SIG=$(read_sig "${f}.sig")
          done

          # macOS x86_64 .app
          for f in artifacts/*x86_64*.app.tar.gz; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            MACOS_X86_URL="${BASE_URL}/${BASENAME}"
            MACOS_X86_SIG=$(read_sig "${f}.sig")
          done

          # macOS aarch64 .app
          for f in artifacts/*aarch64*.app.tar.gz artifacts/*universal*.app.tar.gz; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            MACOS_ARM_URL="${BASE_URL}/${BASENAME}"
            MACOS_ARM_SIG=$(read_sig "${f}.sig")
          done

          # If no separate arm build, use x86 for both (universal)
          if [ -z "$MACOS_ARM_URL" ] && [ -n "$MACOS_X86_URL" ]; then
            MACOS_ARM_URL="$MACOS_X86_URL"
            MACOS_ARM_SIG="$MACOS_X86_SIG"
          fi

          # Windows NSIS
          for f in artifacts/*.nsis.zip; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            WINDOWS_URL="${BASE_URL}/${BASENAME}"
            WINDOWS_SIG=$(read_sig "${f}.sig")
          done

          cat > artifacts/latest.json << EOF
          {
            "version": "${TAG}",
            "notes": "Release ${VERSION} — see https://github.com/${REPO}/releases/tag/${TAG} for full changelog",
            "pub_date": "${DATE}",
            "platforms": {
              "linux-x86_64": {
                "url": "${LINUX_URL}",
                "signature": "${LINUX_SIG}"
              },
              "darwin-x86_64": {
                "url": "${MACOS_X86_URL}",
                "signature": "${MACOS_X86_SIG}"
              },
              "darwin-aarch64": {
                "url": "${MACOS_ARM_URL}",
                "signature": "${MACOS_ARM_SIG}"
              },
              "windows-x86_64": {
                "url": "${WINDOWS_URL}",
                "signature": "${WINDOWS_SIG}"
              }
            }
          }
          EOF

          # Pretty-print for verification
          cat artifacts/latest.json

      - name: Upload to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.tag_name }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          artifacts: "artifacts/*"
