services:
  amigo-downloader:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: amigo-downloader:local
    container_name: amigo-downloader
    ports:
      - "1516:1516"
      - "9666:9666"    # Click'n'Load
    volumes:
      - ./config:/config
      - ./downloads:/downloads
    environment:
      - TZ=Europe/Berlin
      - AMIGO_BIND=0.0.0.0:1516
      # Uncomment for paranoid deployments / public VPS:
      # - AMIGO_SETUP_PIN=${AMIGO_SETUP_PIN}
      # Or for headless provisioning:
      # - AMIGO_SETUP_USER=${AMIGO_SETUP_USER}
      # - AMIGO_SETUP_PASSWORD=${AMIGO_SETUP_PASSWORD}
      # - AMIGO_TRUST_PROXY=true
    restart: unless-stopped
