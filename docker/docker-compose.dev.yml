services:
  web-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: amigo-web-ui
    ports:
      - "5173:5173"
    volumes:
      - ../web-ui:/app/web-ui
      - ../packages/ui:/app/packages/ui
      - /app/node_modules            # Preserve container hoisted node_modules
      - /app/web-ui/node_modules     # Preserve pnpm-linked node_modules
    environment:
      - TZ=Europe/Berlin
