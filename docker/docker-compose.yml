services:
  amigo-downloader:
    image: ghcr.io/amigo-labs/amigo-downloader:latest
    container_name: amigo-downloader
    ports:
      - "1516:1516"
      - "9666:9666"    # Click'n'Load
    volumes:
      - ./config:/config
      - ./downloads:/downloads
    environment:
      - TZ=Europe/Berlin
      - AMIGO_API_KEY=changeme
      - AMIGO_MAX_DOWNLOADS=10
      - AMIGO_BANDWIDTH_LIMIT=0
    restart: unless-stopped
